# PR review reminder — edit GitHub nicknames here (see README in
# .github/pr_review_reminder/README.md).

# Skip reminders when the PR author is one of these accounts.
exclude_users = [
  "dependabot[bot]",
]

# Only remind about PRs that involve someone on this list (author, requested
# reviewer, or person who should act). Leave empty [] for all open PRs in the repo.
team_reviewers = [
  "Wojciech-Rebisz",
  # Add more GitHub nicknames below:
  # "teammate-github-username",
]

# Optional Slack @mentions: GitHub login -> Slack member ID (Slack profile → ⋮ → Copy member ID).
[slack_mentions]
Wojciech-Rebisz = "U0A6FMVQA90"

# Slack emoji per repository (name without colons). Unlisted repos use default_repo_icon.
default_repo_icon = "pr-open-1"

[repo_icons]
"opendatahub-io/pipelines-components" = "pr-open-1"
"red-hat-data-services/pipelines-components" = "downstream_pr"
