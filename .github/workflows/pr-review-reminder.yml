---
# Posts PR review reminders to Slack on schedule and on manual dispatch.
name: PR review Slack reminder

on:
  schedule:
    # Weekdays 10:45 UTC (12:45 CEST / UTC+2). GitHub cron is UTC-only.
    - cron: "45 10 * * 1-5"
  workflow_dispatch:
  # Fallback when GitHub never queues `schedule`.
  repository_dispatch:
    types: [pr-review-reminder]

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send PR review reminders
        env:
          PR_REVIEW_GITHUB_TOKEN: ${{ secrets.PR_REVIEW_GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_REVIEW_REPOSITORIES: ${{ vars.PR_REVIEW_REPOSITORIES }}
          PR_REVIEW_IDLE_HOURS: "0"
          PR_REVIEW_IGNORE_LABELS: "no-reminder,wip"
          PR_REVIEW_GITHUB_SLACK_MAP: ${{ vars.PR_REVIEW_GITHUB_SLACK_MAP }}
        run: |
          PYTHONPATH="$GITHUB_WORKSPACE/.github" \
            python3 -m pr_review_reminder.pr_review_reminder \
              --config .github/pr-review-reminder.toml
